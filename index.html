r flow and the evaporation may not occur at an optimal rate."}, {"id": 203, "question": "What triggers Max Cool?", "section": "Mechanical", "subcategory": "", "answer": "Max Cool is an Amazon design for off-network failsafe cooling that bypasses BMS. Triggered by: high thermal conditions in data hall, high/low pressure in data hall, or manual operational necessity. Provides full cooling capacity by quickly increasing airflow and reducing supply temperature."}, {"id": 204, "question": "Explain the refrigeration cycle?", "section": "Mechanical", "subcategory": "", "answer": "Low-pressure liquid refrigerant enters evaporator coil, absorbs heat from air (cooling the air), evaporates to gas. Compressor compresses gas, raising temperature and pressure. Hot high-pressure gas flows to condenser where heat is rejected (via air or water), condensing back to liquid. Expansion valve reduces pressure, and cycle repeats."}, {"id": 205, "question": "Where is heat added in the refrigeration cycle?", "section": "Mechanical", "subcategory": "", "answer": "Heat is added in the\nevaporator\nwhere refrigerant absorbs heat from the space being cooled, and in the\ncompressor\nwhere mechanical energy adds heat through compression"}, {"id": 206, "question": "Where is heat removed in the refrigeration cycle?", "section": "Mechanical", "subcategory": "", "answer": "Heat is removed in the\ncondenser\nwhere refrigerant rejects absorbed heat to outside air (air-cooled) or condenser water (water-cooled systems)."}, {"id": 207, "question": "How is Max Cool different from Purge?", "section": "Mechanical", "subcategory": "", "answer": ""}, {"id": 208, "question": "What happens in Purge?", "section": "Mechanical", "subcategory": "", "answer": ""}, {"id": 209, "question": "Troubleshooting Scenario: What do you do if a CRAHU is blowing out 100-degree air?", "section": "Mechanical", "subcategory": "", "answer": ""}, {"id": 210, "question": "Discuss latent heat of vaporization", "section": "Mechanical", var html=document.documentElement.outerHTML;
// Replace the [{"id": 1, "question": "Define LLT and what is it?", "section": "Electrical", "subcategory": "", "answer": "Live Load Transfer. When a critical load is switched from primary to standby generator power for 30 mins as a form of preventative maintenance."}, {"id": 2, "question": "What is the purpose of an ATS", "section": "Electrical", "subcategory": "", "answer": "The purpose of an Automatic Transfer Switch is to switch a load from primary to alternate sources of electrical power in the event a source fails. The ATS also returns from alternate to primary power once utility power is restored."}, {"id": 3, "question": "Where do the two sources come from for a rack ATSPSU?", "section": "Electrical", "subcategory": "", "answer": "Source 1: Fed from the primary electrical lineup and Source 2: Alternate/catcher power source fed by an identical distribution path but from a redundant infrastructure."}, {"id": 4, "question": "What is Current (I)? What are the units?", "section": "Electrical", "subcategory": "", "answer": "The rate of flow of electric charge through a conductor. Measured in Amps/Amperes."}, {"id": 5, "question": "What is Voltage (E)? What are the units?", "section": "Electrical", "subcategory": "", "answer": "The electrical potential difference between two points in a circuit, measured in Volts."}, {"id": 6, "question": "What is Resistance (R)? What are the units?", "section": "Electrical", "subcategory": "", "answer": "The opposition to the flow of electric current through a material or component, measured in Ohms."}, {"id": 7, "question": "How does a building transfer to generators durning a utility outage?", "section": "Electrical", "subcategory": "", "answer": "When utility power goes out, the system waits 3 seconds to make sure it's a real outage and not just a flicker. Once confirmed, it opens the utility breaker and tells the generator to start up. The generator takes about 30 seconds to get running and stable. During this time, your UPS batteries keep all the critical IT equipment running so nothing goes down. Once the generator is ready and the utility breaker is fully open, the generator breaker closes and now you're running on generator power. The whole thing takes about 30 to 45 seconds from start to finish. When utility comes back, the system waits about 20 minutes to make sure it's stable, then switches you back the same way"}, {"id": 8, "question": "What are the time delays associated with a power outage and in what order do they occur? What happens at the end of each time delay?", "section": "Electrical", "subcategory": "", "answer": "When utility power goes out, the system waits 3 seconds to confirm it's real, then opens the utility breaker and starts the generator which takes 10-15 seconds (but allows up to 30 before declaring failure). The generator takes 5 seconds to stabilize once it's running, then the generator breaker closes and you're on generator power. When utility comes back, it waits about 20 minutes to make sure it's stable, then does a 2-second delay to open the generator breaker, another 2-second delay to close the utility breaker, and finally the generator runs for 1 more minute to cool down before shutting off"}, {"id": 9, "question": "What are the time delays associated with Utility Power Returning?", "section": "Electrical", "subcategory": "", "answer": "When utility power returns, the system waits about 20 minutes to make sure it's stable and won't fail again, and this timer restarts if the power flickers during that countdown. Once the 20 minutes is up, there's a 2-second delay while the generator breaker opens and the utility breaker closes, then the generator keeps running for 1 more minute to cool down before it shuts off completely"}, {"id": 10, "question": "What steps should a EOT take during a utility outage or waveform capture?", "section": "Electrical", "subcategory": "", "answer": "During a utility outage, an EOT should monitor the automatic transfer process by watching the tower beacons in the electrical room to verify the system switches from utility to generator power correctly, and for a waveform capture, you need to access EPMS, navigate to the correct electrical room and PM8000 unit, select the waveform from the event list, and review the oscilloscope display to determine what caused the event like an overload or short circuit"}, {"id": 11, "question": "What is a TVSS?", "section": "Electrical", "subcategory": "", "answer": "Transient Voltage Surge Suppressor"}, {"id": 12, "question": "What does TVSS do?", "section": "Electrical", "subcategory": "", "answer": "It protects electrical equipment from transient spikes in voltage by clamping the voltage to a manageable level and diverting excess energy to earth."}, {"id": 13, "question": "What does DLB stand for and what does it do?", "section": "Electrical", "subcategory": "", "answer": "Dynamic Load Balancer. automatically manages and balances electrical loads across two catcher systems (backup power sources) to make sure every rack has full redundancy at all times."}, {"id": 14, "question": "What are the 5 major functions of the DLB?", "section": "Electrical", "subcategory": "", "answer": "Realignment Restores the COPs to their normal position (fed from either Catcher 1 or Catcher 2), if they are not already in their normal positions (set by NO/NC selection).\n    Redistribution - Restores the full catcher redundancy to all racks in unaffected lineups after a load is detected in one of the COPs exceeding the load threshold.\n    Balance - Transfers COP loads between catchers and balances the total load across two catchers to help avoid the catcher system being overloaded.\n    Restoration - Restores the bus voltage to the COPs when the primary catcher source powering the COPs is not available.\n    Load Shed - Selects and removes the COP load that would mitigate the catcher from overloading."}, {"id": 15, "question": "If I place a Catcher in Maintenance Mode Via the DLB HMI what will happen?", "section": "Electrical", "subcategory": "", "answer": "When you place a Catcher in Maintenance Mode via the DLB HMI, the system automatically transfers all COPs from that catcher to the other one to unload it for safe maintenance, and when you exit maintenance mode, it automatically redistributes the loads back to restore full redundancy."}, {"id": 16, "question": "What does FLoReS stand for and what does it do?", "section": "Electrical", "subcategory": "", "answer": "FLoReS stands for Fast Loop Restoration Scheme, and it's a system of relays and communication equipment used to control the opening and closing of medium-voltage breakers in a loop design that automatically detects faults in the power distribution system, isolates the faulted sections, and restores power to the unfaulted sections in seconds without human interference, which improves operation, safety, and fault response while minimizing blast radius."}, {"id": 17, "question": "What is a VFI?", "section": "Electrical", "subcategory": "", "answer": "VFI stands for Vacuum Fault Interrupter, and it's a switching device integrated into pad-mounted transformers that uses a vacuum to interrupt fault currents on the primary side of the transformer, typically rated for minimum 12.5 KA at 38 kV, and it's used in loop configurations to isolate faults and protect the transformer from damage while allowing the FLoReS system to automatically reconfigure the power distribution network."}, {"id": 18, "question": "What is the design redundancy of WMW/Rising Power/GB200/GB300 racks?", "section": "Electrical", "subcategory": "", "answer": "WMW and Rising Power racks have N+C redundancy, which means they require at least one whip from any primary power supply (N) plus power from the Catcher redundant supply (C), and GB200 and GB300 racks also follow the N+C redundancy design where power comes from both a primary source (A or B busway) and the Catcher busway through dual power distribution panels feeding the rack."}, {"id": 19, "question": "What is the design redundancy of OPTDC?", "section": "Electrical", "subcategory": "", "answer": "OPTDC has N+2C redundancy, which means it has two full catcher systems providing enhanced redundancy so that racks are never reduced to N (no redundancy) during planned or unplanned events, and this design is deployed on Day 1 in all OPTDC shell buildings with both catcher systems installed during the first phase of construction to allow one catcher to be available during system duress while the second catcher can be used for planned maintenance"}, {"id": 20, "question": "What do the two blue lights on the front of a PDC indicate?", "section": "Electrical", "subcategory": "", "answer": "The two blue indicator lights on the front of a PDC signal activation of the Backstopping system and provide operators a clear visual status upon entering the data hall that the system has automatically transferred partial load to the Catcher side of the cabinet."}, {"id": 21, "question": "At what point does the Critical Switching Team need to perform switching?", "section": "Electrical", "subcategory": "", "answer": "Electrical: Any operation (opening, closing, or changing the state) of an electrical circuit breaker rated at 42A or higher that could affect or interrupt the electrical power supply to customer-supporting equipment, security systems, or life safety/fire protection systems.\nMechanical: Any operation (opening, closing, or changing the state) of a valve or actuator that could reduce or eliminate cooling or protection capacity in a critical space below its designed redundancy level or required flow rate."}, {"id": 22, "question": "During an Emergency can you perform breaker manipulation by yourself?", "section": "Electrical", "subcategory": "", "answer": "During an emergency, you can perform breaker manipulation by yourself, but only under specific conditions. Normally, the Two Person Verification Rule (TPVR) requires two individuals working together before, during, and after component manipulation, with one person as the operator and another as the controller. However, during an emergency or unplanned event, only an Incident Commander or responsible team manager is authorized to override TPVR, and any override exceptions must be documented in an MCM or event ticket by the Incident Commander or responsible team manager and communicated to the Cluster Critical Switching coordinator within 48 hours, and when operations are stable and return to normal, the TPVR will be reinstated"}, {"id": 23, "question": "What is the function of the ATS's fed from the USB", "section": "Electrical", "subcategory": "", "answer": "The ATS's fed from the USB (Utility Switchboard) provide automatic power transfer for the Mechanical Service Distribution Boards that serve critical mechanical cooling systems like CRAHUs, AHUs, chillers, and pumps, where the ATS receives its primary power source from the USB and its secondary source from the Catcher bus-duct, and if the primary USB power is lost for more than a preset time (typically 48-50 seconds), the ATS automatically switches the mechanical cooling loads to the Catcher backup power, then when USB power is restored and stable, it transfers back after a delay (typically 5 minutes in newer designs) to restore normal operation"}, {"id": 24, "question": "In relation to the ATS in an OPTDC what are the typical time delays for switching from S1 to S2, and from S2 to S1?", "section": "Electrical", "subcategory": "", "answer": "48 seconds from S1 to S2 \n5 mins from S2 to S1"}, {"id": 25, "question": "Discuss the policy for resetting breakers.", "section": "Electrical", "subcategory": "", "answer": "FE for all MCCB/ACB trips and MCBS >42A\n\nOnly one attempt to reset a <42a breaker"}, {"id": 26, "question": "Where are the mechanical loads powered from?", "section": "Electrical", "subcategory": "", "answer": "Mechanical loads are powered from the Mechanical Service Distribution Board (MSDB), which receives its primary power source from the USB Switchboard (your source document) and its secondary power source from the Catcher Output Panel (COP) through an Automatic Transfer Switch (ATS), and these loads include critical mechanical cooling systems like CRAHUs, AHUs, chillers, pumps, humidification systems, water distribution control systems, and extract fans that don't require uninterruptible power supply."}, {"id": 27, "question": "What's the purpose of the SKRU?", "section": "Electrical", "subcategory": "", "answer": "The SKRU, which stands for Solenoid Key Release Unit and is also known by trade names like Kirk Keys or Castell Keys, is a safety interlock system that ensures breakers involved in the UPS maintenance bypass process are closed and opened in the correct sequence to prevent connecting two independent power sources simultaneously, and it receives a signal from the UPS when it's on static bypass to allow the release of a physical key that then permits the corresponding breakers to be opened or closed in the proper order during the transition to maintenance bypass mode."}, {"id": 28, "question": "What is the function of the Basler relay? What are it's tolerances?", "section": "Electrical", "subcategory": "", "answer": "The Basler relay functions as a Power Quality Meter that monitors the voltage, frequency, and phase sequence of utility and generator power sources and communicates this information to the PLC in the AMCOP, acting as the \"eyes\" of the AMCOP system, and its tolerances are plus or minus 10% for voltage (under voltage and over voltage), plus or minus 0.25 Hz for frequency (under frequency and over frequency), and it monitors phase sequence while requiring conditions to persist for at least 50 milliseconds before triggering, though it does not monitor overcurrent which is handled by trip units in the main utility and generator breakers."}, {"id": 29, "question": "How do you calculate PUE?", "section": "Electrical", "subcategory": "", "answer": "PUE, which stands for Power Usage Effectiveness, is calculated by dividing the Total Facility Power by the IT Load, and the formula is PUE equals Total Facility Power divided by Critical Power, where Total Facility Power is measured from the main utility meter and includes both critical power and support power like cooling and lighting, while Critical Power or IT Load is measured from the main PDP breaker if only IT loads are served from the PDP or from the summation of IT feeder breakers if the PDP feeds non-IT loads, and a PUE value of 1.0 would be ideal meaning all power goes directly to IT equipment, but in practice data centers typically achieve PUE values between 1.1 and 1.5 depending on their cooling strategy, with lower numbers indicating better efficiency"}, {"id": 30, "question": "What sources of control power does the AMCOP have?", "section": "Electrical", "subcategory": "", "answer": "The AMCOP has multiple sources of control power to ensure reliable operation, including two redundant power supply units (PSU1 and PSU2) that convert 120VAC to 24VDC, an internal UPS and battery charger system, and two batteries (Battery 1 and Battery 2) that provide backup DC power to keep the PLC and control systems operational during power transitions or outages, ensuring the AMCOP can continue monitoring and controlling the transfer scheme even when both utility and generator sources are unavailable."}, {"id": 31, "question": "What do the Stack Light Colors Indicate on a AMCOP?", "section": "Electrical", "subcategory": "", "answer": "The stack light colors on an AMCOP indicate different system statuses, where red means ATS Auto Fail, amber means load on generator, green means system is in automatic mode on utility power, blue means dead bus condition with no power from either utility or generator, and no lights illuminated means the system is in manual operation mode, and the blue light can be illuminated simultaneously with other colors to show combined conditions like blue and green for auto mode with dead bus or blue and red for auto fail with dead bus"}, {"id": 32, "question": "What is BACOP", "section": "Electrical", "subcategory": "", "answer": "BACOP stands for Backstopping Control Panel, and it's a backstopping changeover panel designed to protect critical circuit breakers from overloading by automatically shunt tripping loads downstream of those circuit breakers to transfer power to the Catcher side, which protects the most critical loads by load shedding in a controlled manner, and it consists of a PLC, input/output devices, network switch, SER, HMI, and relays enclosed in a metal enclosure that monitors power flow and can automatically redirect load from where it's powered to another location or drop sacrificial load to prevent catastrophic failure and customer impact, and it's used in legacy, JIT, WMW, and OPTDC data centers with one panel installed on each lineup in the electrical rooms."}, {"id": 33, "question": "BACOP - What is the purpose of the tower beacon assembly and what each of the colors Indicate", "section": "Electrical", "subcategory": "", "answer": "The purpose of the tower beacon assembly on a BACOP is to provide visual status indication of the system's operational state from a distance, and the colors indicate red for critical alarm active, amber for caution alarm active, and green for system healthy with no alarms active."}, {"id": 34, "question": "What is the time delay for deadbus?", "section": "Electrical", "subcategory": "", "answer": "The time delay for deadbus is 90 seconds, which determines how long the system waits when there's no voltage from either utility or generator before sending an alarm to EPMS, and this timer only provides alarm notification and doesn't trigger any control functions or critical transfer sequence operations."}, {"id": 35, "question": "Walk us through turning off a Source 1 Breaker for a flip test using TPVR best practices", "section": "Electrical", "subcategory": "", "answer": "First, ensure the breakers you're about to test match the rack to be powered up as identified in the ticket or workflow tool, then using TPVR, open or turn off the tap box breakers providing the rack's your source document power from the A/B line-up busway, and this will be done for both the upper and lower shelf.\nThe TPVR process requires the performer to physically manipulate the breaker while the verifier performs concurrent verification, where the verifier independently verifies through verbal and visual verification that the performer correctly identifies the equipment prior to step execution, such as saying \"Yes Performer, I concur, change branch circuit breaker #7 on Panel HUPP 1.4A-1 CLOSED to OPEN,\" and then the verifier visually confirms that the performer correctly executes the TPVR step.\nAfter opening the your source document breakers, you should verify that all ATSPSUs transfer to your source document without disrupting the rack load, and if successful, the your source document available LED will be off and the your source document available LED will be on, with the output LED also on"}, {"id": 36, "question": "Emergency Response: Tripped RPDU Breaker", "section": "Electrical", "subcategory": "", "answer": "Check if the rPDU circuit breaker is tripped by looking at the breaker position, close any tripped rPDU circuit breakers one at a time, verify the ATS source circuit breakers are closed, and if either your source document or your source document circuit breakers are tripped or open, close the breaker."}, {"id": 37, "question": "Emergency Response: Wave Form Capture", "section": "Electrical", "subcategory": "", "answer": "In EPMS, select the Electrical Room where the event occurred, select the correct USB lineup either A or B, select the PM8000 next to the MCBU, select WAVEFORM in bottom right of the screen, on the list of events captured select the correct time and date of event, then select appropriate check boxes on top of the oscilloscope display that is presented"}, {"id": 38, "question": "What is a sectionalizing switch?", "section": "Electrical", "subcategory": "", "answer": "A sectionalizing switch is a switching device used in medium voltage distribution systems that allows power to be distributed to either individual feeder breakers or sectionalizing switches that feed a 480VAC USB transformer, helping to isolate sections of the power distribution system."}, {"id": 39, "question": "What are the 4 major brands of critical-load-maintaining UPS systems used by AWS?", "section": "Electrical", "subcategory": "", "answer": "Eaton, Schneider, APC, and Liebert."}, {"id": 40, "question": "Explain how a double conversion UPS works and draw its high-level schematic", "section": "Electrical", "subcategory": "", "answer": "Utility power enters the rectifier which converts AC input to DC, the DC charges the battery and powers the inverter, the inverter converts DC back to clean AC and supplies the load, the batteries are always connected to the inverter so when power loss occurs the rectifier drops out and batteries keep power steady and unchanged, when power returns the rectifier resumes carrying the load and begins charging the batteries."}, {"id": 41, "question": "How many batteries are in a Battery String for a UPS?", "section": "Electrical", "subcategory": "", "answer": "A battery string is 30 to 40 of 16 or 12 VDC VRLA batteries connected in series, typically 40 batteries per string."}, {"id": 42, "question": "Roughly how long can your UPS last on batteries at full design load?", "section": "Electrical", "subcategory": "", "answer": "The UPS batteries are rated to supply power for at least 8 minutes at full design load, with the requirement being 4 minutes at end of battery life."}, {"id": 43, "question": "How does an UPS keeps the batteries charged?", "section": "Electrical", "subcategory": "", "answer": "The UPS uses a float charge of about 13.6 VDC applied to each battery, the rectifier carries most of the load and charges the batteries with the charging current limited to prevent overheating, and float charging cuts out for a certain amount of time once a battery is fully charged so it never overcharges."}, {"id": 44, "question": "What is an IGBT and what is it for?", "section": "Electrical", "subcategory": "", "answer": "An IGBT is an Insulated Gate Bipolar Transistor, a three-terminal power semiconductor switch used to control the flow of electrical energy, it's a voltage controlled hybrid switch that combines characteristics of the BJT and MOSFET, and it's used in UPS inverters to enable creation of high power waveforms through pulse width modulation to generate 480 VAC at 60 Hz."}, {"id": 45, "question": "Why is it necessary to place the UPS on internal bypass before closing the MBP?", "section": "Electrical", "subcategory": "", "answer": "To ensure the critical load remains powered during the transition, the MBP must be closed while the IOB is still closed to parallel the maintenance bypass power with the inverter output before opening the IOB, ensuring either the MBP or IOB is closed at all times to maintain power to the critical load."}, {"id": 46, "question": "Explain the sequence of steps needed to place an UPS in maintenance bypass", "section": "Electrical", "subcategory": "", "answer": "Transfer UPS to static bypass, verify SKRU lamp illuminated, record IOB readings, remove SKRU key, close MBP breaker, verify load is paralleled, open IOB breaker, insert key at SKRU and verify illuminated, the UPS is now in maintenance bypass."}, {"id": 47, "question": "If the UPS goes into Static bypass while the load is on Generator, and Utility returns, what will happen?", "section": "Electrical", "subcategory": "", "answer": "The system will remain on static bypass fed from whatever source is available, the UPS will not automatically transfer back until manually commanded or conditions are met for return to normal operation, and the bypass source will follow the AMCOP switching between utility and generator."}, {"id": 48, "question": "What is the MMS and what is it for?", "section": "Electrical", "subcategory": "", "answer": "MMS stands for Multi-Module System, it's the configuration where parallel UPS modules communicate with each other through CAT5 ethernet to keep synchronized and share load, allowing multiple UPS units to work together as one system."}, {"id": 49, "question": "What is ARC Flash?", "section": "Electrical", "subcategory": "", "answer": "Arc flash is a dangerous electrical explosion that occurs when high current flows through air between conductors or from conductor to ground, releasing tremendous energy in the form of heat, light, and pressure waves that can cause severe burns, injuries, and equipment damage."}, {"id": 50, "question": "How could you find out what potential the arc flash could be?", "section": "Electrical", "subcategory": "", "answer": "Check the arc flash label sticker on the equipment which shows the incident energy level in calories per square centimeter, the arc flash boundary distance, required PPE category, and limited approach boundary, or refer to the arc flash calculations per IEEE 1584-2018 in the Short Circuit Coordination Study."}, {"id": 51, "question": "At what point is arc flash an issue?", "section": "Electrical", "subcategory": "", "answer": "Arc flash is an issue when working on or near energized electrical equipment rated above 50 volts, particularly when opening enclosures, racking breakers, or performing any switching operations on energized equipment."}, {"id": 52, "question": "What is the concern with ARC Flash/blast?", "section": "Electrical", "subcategory": "", "answer": "The concern is severe burns from extreme heat up to 35,000 degrees Fahrenheit, pressure waves that can rupture eardrums and cause internal injuries, molten metal projectiles, blindness from intense light, and potential death, plus equipment damage and facility downtime."}, {"id": 53, "question": "What is the difference between arc flash PPE and electrical shock PPE?", "section": "Electrical", "subcategory": "", "answer": "Arc flash PPE protects against thermal energy, heat, and blast effects using flame-resistant clothing rated in calories per square centimeter, while electrical shock PPE protects against electrical current flow through the body using insulated gloves, sleeves, and voltage-rated equipment."}, {"id": 54, "question": "What forms of energy are we concerned about for LOTO?", "section": "Electrical", "subcategory": "", "answer": "Electrical energy, mechanical energy, hydraulic energy, pneumatic energy, chemical energy, thermal energy, and stored energy in capacitors, springs, or elevated components."}, {"id": 55, "question": "How do you perform a live-dead-live check?", "section": "Electrical", "subcategory": "", "answer": "Test your voltage meter on a known live source to verify it works, test the equipment you're working on to verify it's de-energized, then test your meter again on the known live source to verify the meter still works, this confirms your meter is functioning and the equipment is truly de-energized."}, {"id": 56, "question": "What is an Arc Flash Boundary?", "section": "Electrical", "subcategory": "", "answer": "The distance from exposed energized electrical conductors where a person could receive a second degree burn if an arc flash event occurs, this distance is stated in feet and inches on placards affixed to switchgear."}, {"id": 57, "question": "What is a limited approach boundary?", "section": "Electrical", "subcategory": "", "answer": "The distance from exposed energized electrical conductors where only qualified persons may approach without additional protective equipment."}, {"id": 58, "question": "What is a restricted approach boundary?", "section": "Electrical", "subcategory": "", "answer": "The closest distance a qualified person can approach exposed energized electrical conductors unless they are insulated or guarded from the conductors, where insulated gloves and sleeves are considered insulation only."}, {"id": 59, "question": "Which MV loops support Catcher 1, Catcher 2 and House lineups?", "section": "Electrical", "subcategory": "", "answer": "Catcher 1 = M.L3.C7\nCatcher 2 = M.L6.C1\nHouse = M.L3.C8"}, {"id": 60, "question": "How do you calculate Power Factor?", "section": "Electrical", "subcategory": "", "answer": "Power Factor equals kW divided by kVA, or real power divided by apparent power."}, {"id": 61, "question": "What is KW, KVA, and KVAR?", "section": "Electrical", "subcategory": "", "answer": "KW is kilowatts or real power that does actual work, KVA is kilovolt-amperes or apparent power which is the total power in the circuit, and KVAR is kilovolt-amperes reactive or reactive power which doesn't do useful work but is needed to maintain voltage."}, {"id": 62, "question": "What is the major diference between the Eaton and Mitsubishi static switches?", "section": "Electrical", "subcategory": "", "answer": "The major difference between Eaton and Mitsubishi static switches is their switching technology and speed. Eaton static switches typically use SCR-based technology with very fast switching times around 100-150 milliseconds and have lower thermal fatigue capability, while Mitsubishi static switches generally use IGBT-based technology which can provide even faster switching speeds and better thermal management but may have different overload handling characteristics. The main practical difference you'll notice is in how they handle the transition between inverter and bypass modes during fault conditions, with Eaton units being more common in AWS data centers and having slightly different alarm behaviors and maintenance procedures compared to Mitsubishi units."}, {"id": 63, "question": "Explain the difference between Open and Closed Transition", "section": "Electrical", "subcategory": "", "answer": "Open Transition or break before make breaks contact with one source of power before it makes contact with another source of power, while Closed Transition or make before break makes contact with one power source before it breaks contact with another power source."}, {"id": 64, "question": "Walk through a tie-in on a MEDS USB via catcher bus-breaker (MCB1C or MCB2C)", "section": "Electrical", "subcategory": "", "answer": "Before closing MCB1C/MCB2C:\nVerify MCBU on new lineup is OPEN \nVerify MCBG on new lineup is OPEN  \nApply LOTO to MCBU and MCBG\nVerify dead bus condition on new USB \nPerform Live-Dead-Live check\n\nAMCOP should STAY IN MANUAL throughout\nthe entire procedure until:\nAll tie-in work is complete\nAll breakers are in final confirmed state\nDLB is verified\nOnly THEN return to AUTO"}, {"id": 65, "question": "What is the voltage at the HV Substation level for your site?", "section": "Electrical", "subcategory": "", "answer": "230kV"}, {"id": 66, "question": "What is the voltage at the MV switchgear for your site?", "section": "Electrical", "subcategory": "", "answer": "34.5kV"}, {"id": 67, "question": "What is the voltage at the LV switchgear for your site?", "section": "Electrical", "subcategory": "", "answer": "480Y/277V"}, {"id": 68, "question": "What is the voltage at the Rack level receptacle?", "section": "Electrical", "subcategory": "", "answer": "It comes to the rack at 480v (power shelves convert to 12v or 48v dc for the servers)"}, {"id": 69, "question": "In what circumstance would we need to use a tie-in on a MEDS/USB panel? Is it an Open/Closed Transition?", "section": "Electrical", "subcategory": "", "answer": "Commissioning new equipment and connecting backup power sources to primary systems. Open transition (Break before make)"}, {"id": 70, "question": "What is the utility provider for your site?", "section": "Electrical", "subcategory": "", "answer": ""}, {"id": 71, "question": "If we are on generator, with utility available, and Gen power becomes unacceptable, what will happen?", "section": "Electrical", "subcategory": "", "answer": "basler relays will detect the bad power quality and signal AMCOP, which will automatically initiate an open transition transfer back to utility by opening the generator breaker, waiting through the open transition timer (2 seconds) then closing the utility breaker, while the UPS systems carry the critical load during the brief transfer"}, {"id": 72, "question": "What are some typical size breakers within the facility?", "section": "Electrical", "subcategory": "", "answer": "MCBU/MCBG/MCBC = 4000 AF/AT \nUSB BREAKERS FOR ATS =  800 AF / 600 AT\nUSB BREAKERS FOR PDC = 800 AF / 500 AT"}, {"id": 73, "question": "Name the sources of Control power in your USB", "section": "Electrical", "subcategory": "", "answer": "Taps into Utility Power, Generator Power, CUPP \"A\" Circuit and CUPP \"B\" Circuit"}, {"id": 74, "question": "What is NFPA 70E?", "section": "Safety", "subcategory": "", "answer": "It's the Standard for Electrical Safety in the Workplace that provides requirements for safe work practices to protect personnel from electrical hazards, including establishing electrically safe work conditions and requirements for energized work"}, {"id": 75, "question": "Explain the lock out tag out (LOTO) procedure and discuss why it is needed.", "section": "Safety", "subcategory": "", "answer": "It's a safety procedure to ensure equipment is properly shut off and cannot be started up again before maintenance or repair work is completed, protecting workers from unexpected equipment startup or release of stored energy, and RED locks should be used for LOTO procedures"}, {"id": 76, "question": "What are 3 safety habits you believe most critical to Electrical safety?", "section": "Safety", "subcategory": "", "answer": "Always perform live-dead-live checks to verify equipment is de-energized, use Two Person Verification Rule (TPVR) for critical switching operations, and wear appropriate arc flash and electrical shock PPE based on the hazard level."}, {"id": 77, "question": "How do you escalate a medical emergency?", "section": "Safety", "subcategory": "", "answer": "Call emergency services immediately for unsafe situations like fire or hazardous fumes, then notify the Facility Manager or Secondary Emergency Contact who must contact AWS Environmental within 15 minutes if needed"}, {"id": 78, "question": "What do you do if you find a safety issue onsite?", "section": "Safety", "subcategory": "", "answer": "Escalate immediately and create a finding on AUSTIN https://amer-aws.ehs-amazon.com/home."}, {"id": 79, "question": "Where are all safety rules located?", "section": "Safety", "subcategory": "", "answer": "Safety rules are located in the DCGS Safety wiki, Global Security wiki, Data Center Safety Standard policy and Policy 2.0"}, {"id": 80, "question": "Can you stand on the top rung or top of a ladder?", "section": "Safety", "subcategory": "", "answer": "No, you cannot stand on the top rung or top of a ladder, you must use 3 points of contact while on a ladder and use ladders of appropriate height with large dedicated working surfaces like platform ladders"}, {"id": 81, "question": "How do you properly use a ladder?", "section": "Safety", "subcategory": "", "answer": "To properly use a ladder, you need to use ladders of the appropriate height with large dedicated working surfaces like platform ladders and step stools, avoid A-frame ladders when possible, pass tools or equipment to a coworker so you can maintain three points of contact when traveling up and down the ladder, ensure the ladder is stable and level before climbing, and complete tasks at ground level rather than while on the ladder when working with laptops or other equipment"}, {"id": 82, "question": "What are the 3 points of contact on a ladder?", "section": "Safety", "subcategory": "", "answer": "The 3 points of contact on a ladder means you should always have either two hands and one foot or two feet and one hand in contact with the ladder at all times while climbing up or down, which is why you should pass tools to a coworker rather than carrying them while climbing."}, {"id": 83, "question": "What is the hierarchy of control?", "section": "Safety", "subcategory": "", "answer": ""}, {"id": 84, "question": "When should you remove guards from a tool or equipment?", "section": "Safety", "subcategory": "", "answer": ""}, {"id": 85, "question": "How do you inspect Insulating gloves?", "section": "Safety", "subcategory": "", "answer": ""}, {"id": 86, "question": "When wearing rubber gloves do you wear the leather protectors?", "section": "Safety", "subcategory": "", "answer": ""}, {"id": 87, "question": "Who determines if a person is a \"Qualified Person\"", "section": "Safety", "subcategory": "", "answer": ""}, {"id": 88, "question": "What is an SDS?", "section": "Safety", "subcategory": "", "answer": "Safety Data Sheet - a document containing information on chemical hazards and safe handling procedures, available through the Chemical Risk Assessment and SDS system"}, {"id": 89, "question": "Should you daisy chain power strips or electrical cords together?", "section": "Safety", "subcategory": "", "answer": ""}, {"id": 90, "question": "If you are injured or shocked on the job, when should you report it?", "section": "Safety", "subcategory": "", "answer": "Report immediately - if you are injured or shocked on the job, you should report it right away"}, {"id": 91, "question": "Where can you find the eye wash stations at?", "section": "Safety", "subcategory": "", "answer": "In the Red Zones in their designated 7S locations. At PHX56 they are against the walls between the FCW units in each DH."}, {"id": 92, "question": "Where can we find our First aids/ AEDs?", "section": "Safety", "subcategory": "", "answer": ""}, {"id": 93, "question": "What kind of PPE is necessary to respond to a leak?", "section": "Safety", "subcategory": "", "answer": ""}, {"id": 94, "question": "What is the first thing you should do when you see a leak?", "section": "Safety", "subcategory": "", "answer": ""}, {"id": 95, "question": "Explain how a Photo-electric smoke detectors operate.", "section": "Fire Systems", "subcategory": "", "answer": "An LED light inside the detector sends a beam of light across the chamber, and when smoke enters, smoke particles scatter the light in many directions causing some light to hit the photo-sensor which triggers the alarm."}, {"id": 96, "question": "Define VESDA and discuss how they operate.", "section": "Fire Systems", "subcategory": "", "answer": "Very Early Smoke Detection Apparatus is an aspirating smoke detection system that continuously samples air drawn into it for microscopic smoke particles, activating first in the event of a fire as a very early warning device, typically found in electrical rooms, data halls, and air handling units."}, {"id": 97, "question": "What Main categories of fire alarms are there?", "section": "Fire Systems", "subcategory": "", "answer": "The typical modes are Normal, Alarm, Fault, and Alert, with alarm signals initiated by smoke detector activation, heat detector activation, manual call/pull station activation, or sprinkler flow switches."}, {"id": 98, "question": "What's the difference between supervisory alarms and trouble alarms?", "section": "Fire Systems", "subcategory": "", "answer": "Trouble/fault signals indicate the need for action in connection with supervision of fire suppression systems like fire sprinkler control valve closed, sprinkler tamper switch activated, or high/low pressure switch, while alert signals indicate faults in monitored circuits like contaminated smoke detectors, loss of primary power, system electrical problems, ground faults, short or open circuits, zone or point disabled, or low battery power."}, {"id": 99, "question": "What is a Pre Action System ?", "section": "Fire Systems", "subcategory": "", "answer": "A system that uses both sprinkler and electrical detection systems where water is held back by a pre-action valve and pressurized air in the sprinkler pipework, and the electrical detection system signals the pre-action valve to allow water into the sprinkler pipework when activated, also known as a double knock system because it takes two or more activation devices to trigger water release."}, {"id": 100, "question": "What is a Wet System?", "section": "Fire Systems", "subcategory": "", "answer": "The sprinkler pipes are constantly charged with water under pressure, and when activated water discharges immediately from sprinklers opened by the heat from fire, with an isolation valve on the system to allow water flow to be isolated when safe to do so."}, {"id": 101, "question": "Answer the following questions that pertain to \ufffdwet\ufffd sprinkler systems: List all the areas in your building that use this type of system", "section": "Fire Systems", "subcategory": "", "answer": ""}, {"id": 102, "question": "Answer the following questions that pertain to \ufffdwet\ufffd sprinkler systems: Where and how can you isolate the system?", "section": "Fire Systems", "subcategory": "", "answer": ""}, {"id": 103, "question": "Answer the following questions that pertain to \ufffddry\ufffd pre-action sprinkler systems: What is the purpose of the pre-action system", "section": "Fire Systems", "subcategory": "", "answer": ""}, {"id": 104, "question": "What temperature range or classification is this bulb? Orange or Red", "section": "Fire Systems", "subcategory": "", "answer": ""}, {"id": 105, "question": "What temperature range or classification is this bulb? Yellow or Green", "section": "Fire Systems", "subcategory": "", "answer": ""}, {"id": 106, "question": "What temperature range or classification is this bulb? Blue", "section": "Fire Systems", "subcategory": "", "answer": ""}, {"id": 107, "question": "What temperature range or classification is this bulb? Purple", "section": "Fire Systems", "subcategory": "", "answer": ""}, {"id": 108, "question": "What temperature range or classification is this bulb? Black", "section": "Fire Systems", "subcategory": "", "answer": ""}, {"id": 109, "question": "Where in the DC would we see a Pre-Action system used?", "section": "Fire Systems", "subcategory": "", "answer": "Data halls, electrical rooms, UPS rooms, battery rooms, and communications rooms use pre-action systems."}, {"id": 110, "question": "What is a FACP?", "section": "Fire Systems", "subcategory": "", "answer": "Fire Alarm Control Panel is the controlling component of a fire alarm system, the heart of the system where all detection devices send signals and from which all alarm notifications are sent."}, {"id": 111, "question": "Demonstrate the ablility to place the fire system into test", "section": "Fire Systems", "subcategory": "", "answer": "done in person with mason 'heg-heg' hegar. You set the zones into test in the conference room. There are instructions on the panel too."}, {"id": 112, "question": "What are the classes of fire and what do you use to extinguish them?", "section": "Fire Systems", "subcategory": "", "answer": ""}, {"id": 113, "question": "What is a Clean Agent Fire Suppression, Where do we use it, what chemical do we use?", "section": "Fire Systems", "subcategory": "", "answer": "FM-200 is a hydrofluorocarbon HFC system found in some Perdix units, and Novec 1230 is another clean gaseous agent system designed to quickly extinguish fires while leaving valuable electronics and other sensitive materials clean and operational, used in data centers to protect sensitive equipment."}, {"id": 114, "question": "What kind of Fire extinguishers do we use?", "section": "Fire Systems", "subcategory": "", "answer": ""}, {"id": 115, "question": "What is the fire tetrahedron?", "section": "Fire Systems", "subcategory": "", "answer": "The fire tetrahedron consists of four components needed for a fire to occur: Heat (ignition source like a spark or match), Fuel (combustible material like wood, paper, or cables), Oxygen (from the air at 21% concentration), and Chemical Chain Reaction (the self-sustaining reactions that keep the fire burning, such as thermal runaway in batteries). Fires can be prevented or extinguished by removing any one of these four elements."}, {"id": 116, "question": "What is a fire impairment form and why is it used?", "section": "Fire Systems", "subcategory": "", "answer": "When you inhibit the fire alarm system, a zone, or a single device, you must follow the DCGS Fire System Impairment Notification Procedure located on Policy 2.0, and the Fire Warden will create an MCM and Impairment Form plus notify appropriate people when there is any impairment to the fire detection/suppression system."}, {"id": 117, "question": "Where is the Jockey pump located", "section": "Fire Systems", "subcategory": "", "answer": "Jockey pumps are located in the fire pump house along with the main fire pumps, positioned at strategic points in the piping system between the external water tank and the delivery pipes."}, {"id": 118, "question": "What does the Jockey Pump do", "section": "Fire Systems", "subcategory": "", "answer": "The jockey pump keeps the water pressure in the pipes within a specific predetermined range so when there's a fire the sprinklers will activate in unison instead of randomly, detecting gradual pressure drops from pipe leaks and adjusting them back up to normal pressure."}, {"id": 119, "question": "What do the fire pumps do when Gen is running?", "section": "Fire Systems", "subcategory": "", "answer": ""}, {"id": 120, "question": "Fire watch is required when?", "section": "Fire Systems", "subcategory": "", "answer": "Fire watch is required when the fire alarm system is impaired or disabled, and you should step up building patrols until the issue has been resolved when the fire alarm system is not active or you are unsure of its state."}, {"id": 121, "question": "What are the different kinds of fire pumps", "section": "Fire Systems", "subcategory": "", "answer": "Main fire pumps can be electric or diesel operated, with diesel run fire pump systems typically used including a diesel engine, diesel fuel tank, system control panel, jockey pumps, suction pipes, and delivery pipes, with two engines installed for redundancy in a duty standby arrangement."}, {"id": 122, "question": "How often do we test the fire pumps", "section": "Fire Systems", "subcategory": "", "answer": ""}, {"id": 123, "question": "What are some reasons we put the fire systems into test?", "section": "Fire Systems", "subcategory": "", "answer": "To allow construction or repair works to take place, for maintenance work, and to test system functionality without triggering actual alarms throughout the facility."}, {"id": 124, "question": "What is the presure in normal operation regarding the wet and dry side of the fire system", "section": "Fire Systems", "subcategory": "", "answer": ""}, {"id": 125, "question": "Why do emergency strobes need to be in sync?", "section": "Fire Systems", "subcategory": "", "answer": "Emergency strobes need to be synchronized to prevent triggering photosensitive epilepsy in individuals, the short bright flashes are more effective when coordinated, and synchronized strobes provide clearer visual alerts that are easier to recognize as emergency signals rather than random flashing lights."}, {"id": 126, "question": "What is a booster pump?", "section": "Fire Systems", "subcategory": "", "answer": "A booster pump is a pump used to increase water pressure in the fire suppression system when the main water supply pressure is insufficient to reach upper floors or distant areas of a building, ensuring adequate pressure at all sprinkler heads throughout the facility."}, {"id": 127, "question": "What is a solenoid valve?", "section": "Fire Systems", "subcategory": "", "answer": "A solenoid valve is an electromechanically operated valve controlled by an electric current through a solenoid coil, used in fire suppression systems to control the flow of water or gas, and in pre-action systems the solenoid valve receives signals from the fire detection system to open and allow water into the sprinkler pipes."}, {"id": 128, "question": "How does a Single Interlock system work?", "section": "Fire Systems", "subcategory": "", "answer": "A Single Interlock system, also called Single Knock, requires only one type of trigger to activate water release, such as just a broken sprinkler head, and when the sprinkler head breaks due to heat, water immediately flows without requiring any additional detection system activation."}, {"id": 129, "question": "How does a Double interlock system work ?", "section": "Fire Systems", "subcategory": "", "answer": "A Double Interlock system, also called Double Knock or pre-action system, requires two or more activation devices to trigger water release, such as an activated smoke detector and a broken sprinkler head, where the smoke detector signals the pre-action valve to fill the pipes with water, and then when a sprinkler head breaks from heat, water is released, preventing accidental water discharge in sensitive areas like data halls and electrical rooms."}, {"id": 130, "question": "Define the following terms: rPDU", "section": "General Shift Readiness", "subcategory": "", "answer": "Rack Power Distribution Unit - the power distribution equipment mounted in racks that hosts, TORs, and other equipment connect to for power, typically receiving power from ATS units."}, {"id": 131, "question": "Define the following terms: TOR", "section": "General Shift Readiness", "subcategory": "", "answer": "Top of Rack switch - the network device that enables hosts to connect to the Amazon Network, essentially the networking equipment at the top of server racks."}, {"id": 132, "question": "What is a flip test and when should it be completed?", "section": "General Shift Readiness", "subcategory": "", "answer": "A test performed on racks with ATS where the your source document (utility) breaker is turned off to verify the ATS properly transfers to your source document (Catcher) without dropping power to the rack, completed during rack power-up procedures"}, {"id": 133, "question": "Emergency Response: TOR Failure (Sev 2 Rack Down)", "section": "General Shift Readiness", "subcategory": "", "answer": "When a TOR fails causing a Sev 2 rack down, you follow the RDWF (Rackdown Workflow) which guides you through steps including power cycling the TOR, obtaining a compatible spare from the STORM rack if needed, and replacing the failed unit while following proper procedures"}, {"id": 134, "question": "How do you know which approvers to place on the MCM?", "section": "General Shift Readiness", "subcategory": "", "answer": "The approval chain is designed based on the tier level and type of MCM - you need to follow the approval table in the MCM program which typically includes peers, a bar-raiser, and management, with specific approvers determined by the tier rating and whether it's RRPR or LLS work"}, {"id": 135, "question": "How do you determine the Tier Rating of a MCM?", "section": "General Shift Readiness", "subcategory": "", "answer": "Tier 1 places customers one failure away from impact (loss of rack redundancy), Tier 2 places the data center at loss of design resiliency, Tier 3 causes MEP system impairment without placing customers one failure away, and Tier 4 is work in red/yellow zones that doesn't impair systems"}, {"id": 136, "question": "What is the SPCC and where can it be found?", "section": "General Shift Readiness", "subcategory": "", "answer": "Spill Prevention Control and Countermeasure plan - refer to your site-specific spill response plan, and the spill reporting policy is available at Policy 2.0"}, {"id": 137, "question": "What's the difference between an MCM and a trouble ticket?", "section": "General Shift Readiness", "subcategory": "", "answer": "MCMs are for planned work activities and changes to physical operational infrastructure requiring approval and documentation, while trouble tickets are for reactive issues, alarms, and unplanned events requiring immediate response"}, {"id": 138, "question": "When is a hot work permit needed and where can you find one?", "section": "General Shift Readiness", "subcategory": "", "answer": ""}, {"id": 139, "question": "Describe when an energized electrical work permit (EEWP) is needed?", "section": "General Shift Readiness", "subcategory": "", "answer": "Required when working on energized electrical equipment, though exemptions exist for testing, troubleshooting, or voltage measuring - must use appropriate PPE and safe work practices"}, {"id": 140, "question": "What are the requirements of making an MCM \"Planned.\"", "section": "General Shift Readiness", "subcategory": "", "answer": "Must be submitted for review and approval at least 14 calendar days before scheduled start date, with all required documentation, MOP/SOP attached, tier defined, blast radius calculated, and proper approvals obtained"}, {"id": 141, "question": "Whats the difference between Urgent and Emergency MCM's?", "section": "General Shift Readiness", "subcategory": "", "answer": "Urgent MCMs are for work needed within 7-14 days, Emergency MCMs are for work that must be conducted within 24 hours of raising the MCM and setting to pending approval"}, {"id": 142, "question": "When do you need to call the FOC to have them put your MCM into progress?", "section": "General Shift Readiness", "subcategory": "", "answer": "Contact the FOC when you've completed all pre-work and pre-check steps and are ready to commence the activity - the FOC will thoroughly vet the MCM to ensure compliance with Data Center Change Management Program requirements and only change the state to \"in progress\" when required conditions are met"}, {"id": 143, "question": "What is inframap and what is it used for?", "section": "General Shift Readiness", "subcategory": "", "answer": "A website used for electrical and mechanical equipment management, metrics, and visualizations in AWS data centers, providing device inventory management, lineup utilization monitoring, and real-time data that updates once per minute"}, {"id": 144, "question": "Where do you find a FSB/FSA WO?", "section": "General Shift Readiness", "subcategory": "", "answer": "Found in EAM (Enterprise Asset Management) - FSBs (Field Service Bulletins) are assigned to your site as open Work Orders created by the EAM Team to rectify availability or safety issues, you can find them in the EAM dashboard"}, {"id": 145, "question": "EOT Prioirties in order", "section": "General Shift Readiness", "subcategory": "", "answer": "1) Safety of personnel (always #1), 2) Stabilize equipment, 3) Respond to alarms/tickets, 4) Customer impact mitigation. The escalation follows: FOC \u2192 Chief Engineer \u2192 Facility Manager \u2192 Cluster DCEO Manager \u2192 Cluster InfraOps Manager \u2192 InfraOps Director"}, {"id": 146, "question": "What is Amazon\ufffds code of ethics?", "section": "General Shift Readiness", "subcategory": "", "answer": ""}, {"id": 147, "question": "Where do you find published procedures?", "section": "General Shift Readiness", "subcategory": "", "answer": "Published procedures are found in InfraOps Docs, the approved document repository for all EOPs and SOPs accessible to EOTs at Amazon. They're also in the MCM Wiki and through various policy links."}, {"id": 148, "question": "What is TPVR and when is it required?", "section": "General Shift Readiness", "subcategory": "", "answer": "TPVR (Two Person Verification Rule) requires two individuals to work together before, during, and after component manipulation. It's required when changing the state of circuit breakers above 150 amps or mechanical switches that could impact critical load. Both must be blue-badged employees, and for breakers >150A both must be CST qualified - one as Controller and one as Operator. Controllers need 12 months AWS data center experience, Operators need 6 months."}, {"id": 149, "question": "What is the escalation process?", "section": "General Shift Readiness", "subcategory": "", "answer": ""}, {"id": 150, "question": "What are the 2 circumstances a DCEO could receive an autocut SEV 2 ticket", "section": "General Shift Readiness", "subcategory": "", "answer": "Every rackdown event generates two SEV2 tickets - a Primary TT (arrives in DCO queue) and a Notification TT (arrives in DCEO queue) to notify DCEO of rackdown events relevant to them"}, {"id": 151, "question": "Demonstrate the ability to request access for a vendor/AWS  through Amazon Optics", "section": "General Shift Readiness", "subcategory": "", "answer": "Vendor Access Request in Amazon Optics\n\n1. Navigate: Access Management \u2192 New Access Request\n\n2. Select: \"Visitor\" request type\n\n3. Add Details: Vendor name and company\n\n4. Set Access: Choose region, site, and specific areas needed\n\n5. Configure: Set dates/times and provide detailed business justification\n\n6. Submit: Review and submit for AAM approval (Link can be copied and shared with any AAM eg CE, FM in AZ for approval )"}, {"id": 152, "question": "Demonstrate the ability to request access for a vendor/AWS through Raging Wire", "section": "General Shift Readiness", "subcategory": "", "answer": "Vendor Access Request in Amazon Optics\n\n1. Navigate: Access Management \u2192 New Access Request\n\n2. Select: \"Visitor\" request type\n\n3. Add Details: Vendor name and company\n\n4. Set Access: Choose region, site, and specific areas needed\n\n5. Configure: Set dates/times and provide detailed business justification\n\n6. Submit: Review and submit for AAM approval (Link can be copied and shared with any AAM eg CE, FM in AZ for approval )"}, {"id": 153, "question": "Demonstrate the ability to request Smart Hands access for a vendor/AWS through Amazon Optics", "section": "General Shift Readiness", "subcategory": "", "answer": "Vendor Access Request in Amazon Optics\n\n1. Navigate: Access Management \u2192 New Access Request\n\n2. Select: \"Visitor\" request type\n\n3. Add Details: Vendor name and company\n\n4. Set Access: Choose region, site, and specific areas needed\n\n5. Configure: Set dates/times and provide detailed business justification\n\n6. Submit: Review and submit for AAM approval (Link can be copied and shared with any AAM eg CE, FM in AZ for approval )"}, {"id": 154, "question": "When do you grant Smart hands access", "section": "General Shift Readiness", "subcategory": "", "answer": ""}, {"id": 155, "question": "How do you determine the Tier Rating of a MCM?", "section": "General Shift Readiness", "subcategory": "", "answer": "Tier 1 places customers one failure away from impact (loss of rack redundancy), Tier 2 places the data center at loss of design resiliency, Tier 3 causes MEP system impairment without placing customers one failure away, and Tier 4 is work in red/yellow zones that doesn't impair systems"}, {"id": 156, "question": "How do you know which approvers to place on the MCM?", "section": "General Shift Readiness", "subcategory": "", "answer": "The approval chain is designed based on the tier level and type of MCM - you need to follow the approval table in the MCM program which typically includes peers, a bar-raiser, and management, with specific approvers determined by the tier rating and whether it's RRPR or LLS work"}, {"id": 157, "question": "Demonstrate the ability to write a tier 2 or 3 MCM", "section": "General Shift Readiness", "subcategory": "", "answer": "1. Planning\n\nCheck if MCM required: Any intrusive change to production environment\n\nDetermine tier: Tier 1 (highest risk), Tier 2 (non-standard work), or Tier 3 (standard work)\n\nVerify timing: Check Standfast calendar for blocked days\n\n2. Prepare Documents\n\nMethod of Procedure (MOP): Use correct template\n\nRisk Assessment Form: Complete digital format\n\nSupporting docs: Safety forms, drawings, related tickets\n\n3. Create MCM\n\nChoose template: Based on work type and tier\n\nFill key sections: Title, dates, description, location, personnel\n\nAdd steps: Preflight steps and major milestones\n\nSet approvers: Include MCM-BR for Tier 1/2 MCMs\n\n4. Submit\n\nCreate draft: Click \"Create CM\" for MCM number\n\nUpload attachments: MOP, risk forms, related items\n\nLink requirements: EAM work orders, blast radius, safety docs\n\nSubmit for approval: Begin approval workflow\n\n5. Review Process\n\nMCM-BR review: For Tier 1/2 MCMs (validates compliance)\n\nAddress feedback: Make required changes\n\nFinal approval: Authorization to proceed with work"}, {"id": 158, "question": "Demonstrate the ability to write a tier 1 RRPR MCM", "section": "General Shift Readiness", "subcategory": "", "answer": "1. Planning\n\nCheck if MCM required: Any intrusive change to production environment\n\nDetermine tier: Tier 1 (highest risk), Tier 2 (non-standard work), or Tier 3 (standard work)\n\nVerify timing: Check Standfast calendar for blocked days\n\n2. Prepare Documents\n\nMethod of Procedure (MOP): Use correct template\n\nRisk Assessment Form: Complete digital format\n\nSupporting docs: Safety forms, drawings, related tickets\n\n3. Create MCM\n\nChoose template: Based on work type and tier\n\nFill key sections: Title, dates, description, location, personnel\n\nAdd steps: Preflight steps and major milestones\n\nSet approvers: Include MCM-BR for Tier 1/2 MCMs\n\n4. Submit\n\nCreate draft: Click \"Create CM\" for MCM number\n\nUpload attachments: MOP, risk forms, related items\n\nLink requirements: EAM work orders, blast radius, safety docs\n\nSubmit for approval: Begin approval workflow\n\n5. Review Process\n\nMCM-BR review: For Tier 1/2 MCMs (validates compliance)\n\nAddress feedback: Make required changes\n\nFinal approval: Authorization to proceed with work"}, {"id": 159, "question": "Demonstrate the ability to Open a tier 2 or 3 MCM", "section": "General Shift Readiness", "subcategory": "", "answer": ""}, {"id": 160, "question": "Demonstrate the ability to close, and complete a tier 2 or 3 MCM", "section": "General Shift Readiness", "subcategory": "", "answer": ""}, {"id": 161, "question": "Demonstrate the ability to Open,  a tier 1 MCM", "section": "General Shift Readiness", "subcategory": "", "answer": ""}, {"id": 162, "question": "Demonstrate the ability to close, and complete a tier 1 MCM", "section": "General Shift Readiness", "subcategory": "", "answer": ""}, {"id": 163, "question": "Whats the difference between Urgent and Emergency MCM's?", "section": "General Shift Readiness", "subcategory": "", "answer": "Urgent MCMs are for work needed within 7-14 days, Emergency MCMs are for work that must be conducted within 24 hours of raising the MCM and setting to pending approval"}, {"id": 164, "question": "What are the requirements of making an MCM \"Planned.\"", "section": "General Shift Readiness", "subcategory": "", "answer": "Must be submitted for review and approval at least 14 calendar days before scheduled start date, with all required documentation, MOP/SOP attached, tier defined, blast radius calculated, and proper approvals obtained"}, {"id": 165, "question": "Demonstrate the ability to find the following Amazon Wiki pages: AWS Standfast Program and Calendar", "section": "General Shift Readiness", "subcategory": "", "answer": "https://availability-analytics.corp.amazon.com/standfast_calendar"}, {"id": 166, "question": "Demonstrate the ability to find the following Amazon Wiki pages: PHX Escalation", "section": "General Shift Readiness", "subcategory": "", "answer": ""}, {"id": 167, "question": "Demonstrate the ability to find the following Amazon Wiki pages: PHX DCEO", "section": "General Shift Readiness", "subcategory": "", "answer": ""}, {"id": 168, "question": "EOT Prioirties in order", "section": "General Shift Readiness", "subcategory": "", "answer": "1) Safety of personnel (always #1), 2) Stabilize equipment, 3) Respond to alarms/tickets, 4) Customer impact mitigation. The escalation follows: FOC \u2192 Chief Engineer \u2192 Facility Manager \u2192 Cluster DCEO Manager \u2192 Cluster InfraOps Manager \u2192 InfraOps Director"}, {"id": 169, "question": "What is Amazon\ufffds code of ethics?", "section": "General Shift Readiness", "subcategory": "", "answer": ""}, {"id": 170, "question": "Discuss the purpose of the SIM ticket system", "section": "General Shift Readiness", "subcategory": "", "answer": "SIM (Simple Issue Management) is the program that will replace TT (Trouble Ticketing). It's used to track issues, events, and work activities. The FOC uses it to cut tickets for alarms and events, and EOTs use it for tracking work and escalations"}, {"id": 171, "question": "Discuss the difference between severity/tier levels and the time requirements to resolve each", "section": "General Shift Readiness", "subcategory": "", "answer": "SEV 1 is highest priority where entire operations are threatened and needs resolution in 2 hours. SEV 2 is when business critical functionality is or could be affected and must be resolved the same day. SEV 3 doesn't impact customer experience and doesn't affect critical load. SEV 5 is least important where productivity isn't affected at all. If there's inaction for 30 minutes in \"Assigned\" status, the ticket rolls over to the other EOT on campus, and each hour it rotates to the next higher manager."}, {"id": 172, "question": "What's the difference between an MCM and a SIM/Trouble ticket?", "section": "General Shift Readiness", "subcategory": "", "answer": "MCMs are for planned work activities and changes to physical operational infrastructure requiring approval and documentation. Trouble tickets (TT/SIM) are for reactive issues, alarms, and unplanned events requiring immediate response"}, {"id": 173, "question": "What can you find on Infra Maps, list items found on this website.", "section": "General Shift Readiness", "subcategory": "", "answer": "InfraMap shows electrical and mechanical equipment management, metrics, and visualizations including device inventory management, lineup utilization monitoring, PUE, SOS, One Lines, Inventory, Metrics, Utilization, Floor Maps, ATS status, and Notifications. Data updates once per minute"}, {"id": 174, "question": "What is TPVR and when is it required?", "section": "General Shift Readiness", "subcategory": "", "answer": "TPVR (Two Person Verification Rule) requires two individuals to work together before, during, and after component manipulation. It's required when changing the state of circuit breakers above 150 amps or mechanical switches that could impact critical load. Both must be blue-badged employees, and for breakers >150A both must be CST qualified - one as Controller and one as Operator. Controllers need 12 months AWS data center experience, Operators need 6 months."}, {"id": 175, "question": "What is a COE and why would you create one?", "section": "General Shift Readiness", "subcategory": "", "answer": "COE (Correction of Error) reports list when an error caused customer disruption. Each one details all failures that led to downtime for customers. You create one to document unforced errors, learn from mistakes, and prevent recurrence. They're mandatory for SEV 1 and most SEV 2 events"}, {"id": 176, "question": "Where do you find published procedures?", "section": "General Shift Readiness", "subcategory": "", "answer": "Published procedures are found in InfraOps Docs, the approved document repository for all EOPs and SOPs accessible to EOTs at Amazon. They're also in the MCM Wiki and through various policy links."}, {"id": 177, "question": "What are 3 safety habits you believe most critical to Electrical safety?", "section": "General Shift Readiness", "subcategory": "", "answer": "Always perform live-dead-live checks to verify equipment is de-energized, use Two Person Verification Rule (TPVR) for critical switching operations, and wear appropriate arc flash and electrical shock PPE based on the hazard level."}, {"id": 178, "question": "Who has authority to operate breakers in a Colo", "section": "General Shift Readiness", "subcategory": "", "answer": "In colocation environments, all switching is typically done by the colocation provider and their system vendors, but all critical switching must be witnessed based on the switching procedure"}, {"id": 179, "question": "What is the Billing Model for a Colo?", "section": "General Shift Readiness", "subcategory": "", "answer": ""}, {"id": 180, "question": "What is a CRAHU or AHU and how do they work?", "section": "Mechanical", "subcategory": "", "answer": "Devices that condition and circulate air for HVAC. They contain blowers, heating/cooling elements, filters, dampers, and sound attenuators. CRAHUs specifically use fans and chilled water passing through heat exchangers to remove heat from data centers\nSupply fans draw air through filters, pass it through cooling systems (free cooling, evaporative pads, or chilled water coils), then push cooled air into data hall cold aisles. Air passes through IT equipment, absorbs heat, exits into hot aisles, and returns to the AHU via return air dampers or is exhausted.S"}, {"id": 181, "question": "What is thermal conductivity?", "section": "Mechanical", "subcategory": "", "answer": "The ability of a material to conduct heat. It's a measure of how easily heat energy can transfer through a material from a hotter region to a cooler region"}, {"id": 182, "question": "How if a VFD used in cooling?", "section": "Mechanical", "subcategory": "", "answer": "It ssupplies AC power of varying frequency to control motor speed. In data centers, VFDs control the speed of fans, pumps, and chillers to modulate cooling capacity and optimize energy efficiency."}, {"id": 183, "question": "Describe the 5 commonly referred to cooling modes", "section": "Mechanical", "subcategory": "", "answer": "1. Free Cooling Mode: Uses 100% outside air when ambient conditions are cool enough. Outside air damper open, bypass damper 100% open (bypassing evap pads and chilled water coil), return air damper modulates with outside air damper to maintain supply air temperature. Most energy efficient. \n2. Evaporative Cooling Mode: Water pumped over evaporative media pads. Outside air damper 100% open, return air damper 100% closed, bypass damper modulates to control airflow through wetted pads. Water evaporation cools the air stream. Requires up to 95% less energy than traditional cooling. \n3. Chilled Water Cooling Mode: Outside air forced through chilled water coils fed from central chiller plant. Outside air damper 100% open, bypass damper 100% closed (all air through coil), return air damper 100% closed. Chilled water valve modulates to maintain supply temperature setpoint. \n4. Combo/Mixed Mode: Combination of evaporative and chilled water cooling working together when chiller alone cannot maintain temperatures. Most effective form of cooling for high-load conditions. \n5. Recirculation Mode: Return air from hot aisles mixed with outside air to maintain proper supply temperature when outside air is too cold. Return and outside air dampers modulate opposite each other."}, {"id": 184, "question": "Explain blowdown?", "section": "Mechanical", "subcategory": "", "answer": "The periodic purging of water from a boiler, condenser, or cooling system to remove particles, dissolved solids, and salts. Prevents scale, corrosion, and equipment damage."}, {"id": 185, "question": "What is evaporative cooling?", "section": "Mechanical", "subcategory": "", "answer": "A cooling method using the cooling effect of liquid water evaporation to cool an air stream directly or indirectly. Water absorbs heat energy to change phase from liquid to vapor, drawing heat from surrounding air. Very energy efficient."}, {"id": 186, "question": "Explain what the evaporator coil does?", "section": "Mechanical", "subcategory": "", "answer": "A device that changes low-pressure cold-liquid refrigerant back to gas by evaporating the liquid. In data centers, evaporators in air-conditioning units and chillers remove heat generated by IT equipment"}, {"id": 187, "question": "Explain how humidity affects evaporative cooling", "section": "Mechanical", "subcategory": "", "answer": "High humidity reduces evaporative cooling effectiveness because air already holds significant moisture, slowing evaporation rate. The greater the difference between wet bulb and dry bulb temperatures, the greater the evaporative cooling effect. At high wet bulb temperatures, evaporative cooling becomes ineffective."}, {"id": 188, "question": "Discuss Wet Bulb vs Dry Bulb temperature", "section": "Mechanical", "subcategory": "", "answer": "Dry bulb is actual air temperature measured by standard thermometer. Wet bulb is temperature measured with moisture-covered thermometer bulb, showing cooling effect of evaporation. The difference between them measures potential for evaporative cooling - greater difference means greater cooling capacity."}, {"id": 189, "question": "What is refrigeration?", "section": "Mechanical", "subcategory": "", "answer": "the process of removing heat from a space or substance to lower and maintain its temperature below the ambient environment by transferring heat energy using a refrigerant that cycles through different states"}, {"id": 190, "question": "What is humidity?", "section": "Mechanical", "subcategory": "", "answer": "The amount of water vapor present in air. In data centers, measured as relative humidity"}, {"id": 191, "question": "Why is humidity important to a data center?", "section": "Mechanical", "subcategory": "", "answer": "If air is too humid, water may condense on internal components causing electrical shorts. If air is too dry, electrostatic discharge (ESD) can occur, also causing electrical shorts. High RH can cause rust on electronic components. Temperature and humidity must be kept consistent within specific limits."}, {"id": 192, "question": "What is differential pressure?", "section": "Mechanical", "subcategory": "", "answer": "Differential Pressure: The difference in pressure between two locations. Air flows from higher to lower pressure areas."}, {"id": 193, "question": "Why is differential pressure important within data halls / vaults ?", "section": "Mechanical", "subcategory": "", "answer": "Controls proper airflow direction and volume. In raised floor designs, DP between subfloor plenum and above-floor space ensures adequate cold air delivery through perforated tiles. Maintains proper air distribution to IT equipment and prevents hot/cold air mixing. Usually controlled by supply air fans."}, {"id": 194, "question": "Explain how to perform an air filter inspection and replacement", "section": "Mechanical", "subcategory": "", "answer": "To inspect air filters, visually check them during your scheduled PM for dirt loading, damage, or gaps that could allow bypass. If using AssetPulse (InfraGuard), the system automatically creates tickets to order and replace filters based on remaining filter life. For disposable filters , remove the dirty filter and install a new one ensuring proper fit and airflow direction. For washable filters , remove them, back-flush with water in reverse airflow direction, let them dry completely, then reinstall. Document all work in EAM and verify filters are properly seated to prevent bypass"}, {"id": 195, "question": "How do you perform temperature monitoring?", "section": "Mechanical", "subcategory": "", "answer": "To perform temperature monitoring, you use BMS and InfraMap\nto view real-time cold aisle temperatures, supply air temperatures, and return air temperatures, checking for deviations from setpoints or alarms. For physical verification, you use a calibrated handheld thermometor thermal imaging gun\nto spot-check temperatures at rack inlets and identify hot spots. During rounds, you visually inspect for Thermal Critical Racks (TCRs) with amber LED indicators s
