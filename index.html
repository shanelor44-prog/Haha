howing elevated temperatures and investigate any containment gaps or airflow issues."}, {"id": 196, "question": "Explain step by step of responding to an alarm", "section": "Mechanical", "subcategory": "", "answer": ""}, {"id": 197, "question": "What is CFM and it's applications?", "section": "Mechanical", "subcategory": "", "answer": "(Cubic Feet per Minute)"}, {"id": 198, "question": "What are the 4 major components in a refrigerant-based cooling system?", "section": "Mechanical", "subcategory": "", "answer": "Compressor - Compresses refrigerant gas, raising pressure and temperature\n    Condenser - Removes heat from refrigerant, condensing it from gas to liquid\n    Expansion Valve - Reduces pressure of liquid refrigerant\n    Evaporator - Absorbs heat, evaporating refrigerant from liquid to gas"}, {"id": 199, "question": "Explain how mechanical, refrigerant-based cooling works", "section": "Mechanical", "subcategory": "", "answer": "Low-pressure liquid refrigerant enters evaporator coil, absorbs heat from air (cooling the air), evaporates to gas. Compressor compresses gas, raising temperature and pressure. Hot high-pressure gas flows to condenser where heat is rejected (via air or water), condensing back to liquid. Expansion valve reduces pressure, and cycle repeats."}, {"id": 200, "question": "How does BMS respond to high cold aisle temperature?", "section": "Mechanical", "subcategory": "", "answer": ""}, {"id": 201, "question": "Explain the sump level float switches and their use", "section": "Mechanical", "subcategory": "", "answer": "They are used in the sump tanks to send signals to the BMS. They indicate water levels."}, {"id": 202, "question": "Discuss the effects of high or low water flow on media on AHU operations", "section": "Mechanical", "subcategory": "", "answer": "Too low and the media will not be saturated and you get less evap cooling. \nHigh water flow can result in too much humidity in the air so you have worse cooling. The media may have too much water flow and the evaporation may not occur at an optimal rate."}, {"id": 203, "question": "What triggers Max Cool?", "section": "Mechanical", "subcategory": "", "answer": "Max Cool is an Amazon design for off-network failsafe cooling that bypasses BMS. Triggered by: high thermal conditions in data hall, high/low pressure in data hall, or manual operational necessity. Provides full cooling capacity by quickly increasing airflow and reducing supply temperature."}, {"id": 204, "question": "Explain the refrigeration cycle?", "section": "Mechanical", "subcategory": "", "answer": "Low-pressure liquid refrigerant enters evaporator coil, absorbs heat from air (cooling the air), evaporates to gas. Compressor compresses gas, raising temperature and pressure. Hot high-pressure gas flows to condenser where heat is rejected (via air or water), condensing back to liquid. Expansion valve reduces pressure, and cycle repeats."}, {"id": 205, "question": "Where is heat added in the refrigeration cycle?", "section": "Mechanical", "subcategory": "", "answer": "Heat is added in the\nevaporator\nwhere refrigerant absorbs heat from the space being cooled, and in the\ncompressor\nwhere mechanical energy adds heat through compression"}, {"id": 206, "question": "Where is heat removed in the refrigeration cycle?", "section": "Mechanical", "subcategory": "", "answer": "Heat is removed in the\ncondenser\nwhere refrigerant rejects absorbed heat to outside air (air-cooled) or condenser water (water-cooled systems)."}, {"id": 207, "question": "How is Max Cool different from Purge?", "section": "Mechanical", "subcategory": "", "answer": ""}, {"id": 208, "question": "What happens in Purge?", "section": "Mechanical", "subcategory": "", "answer": ""}, {"id": 209, "question": "Troubleshooting Scenario: What do you do if a CRAHU is blowing out 100-degree air?", "section": "Mechanical", "subcategory": "", "answer": ""}, {"id": 210, "question": "Discuss latent heat of vaporization", "section": "Mechanical", "subcategory": "", "answer": ""}, {"id": 211, "question": "What is a chiller and what is it's purpose?", "section": "Mechanical", "subcategory": "", "answer": ""}, {"id": 212, "question": "Name different types of chillers", "section": "Mechanical", "subcategory": "", "answer": ""}, {"id": 213, "question": "What is a cooling tower?", "section": "Mechanical", "subcategory": "", "answer": ""}, {"id": 214, "question": "In general, how much gallons of water does an AWS DC use?", "section": "Mechanical", "subcategory": "", "answer": ""}, {"id": 215, "question": "What is a pump and how is it used in a DC?", "section": "Mechanical", "subcategory": "", "answer": ""}, {"id": 216, "question": "What is a FCW?", "section": "Mechanical", "subcategory": "", "answer": "Fire Alarm Control Panel is the controlling component of a fire alarm system, the heart of the system where all detection devices send signals and from which all alarm notifications are sent."}, {"id": 217, "question": "What are the ranges for indoor temperatures for AC cooled spaces? What is the respective humidity?", "section": "Mechanical", "subcategory": "", "answer": ""}, {"id": 218, "question": "What is the purpose of our generators?", "section": "Mechanical", "subcategory": "", "answer": ""}, {"id": 219, "question": "Why do we use diesel generators?", "section": "Mechanical", "subcategory": "", "answer": ""}, {"id": 220, "question": "What is wet stacking?", "section": "Mechanical", "subcategory": "", "answer": ""}, {"id": 221, "question": "How many starting batteries does the generator have? How are they wired? What's the voltage?", "section": "Mechanical", "subcategory": "", "answer": ""}, {"id": 222, "question": "What's acceptable block heater coolant temperature when our generators aren't running?", "section": "Mechanical", "subcategory": "", "answer": "90-130 degreef f"}, {"id": 223, "question": "Explain EMCP LED Indicator Meanings", "section": "Mechanical", "subcategory": "", "answer": ""}, {"id"
